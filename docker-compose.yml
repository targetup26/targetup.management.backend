version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: targetup_db
    restart: always
    env_file:
      - .env
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASS}
      MYSQL_DATABASE: ${DB_NAME}
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

  redis:
    image: redis:alpine
    container_name: targetup_redis
    restart: always
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data

  backend:
    build: .
    container_name: targetup_backend
    restart: always
    ports:
      - "${PORT:-5050}:${PORT:-5050}"
    env_file:
      - .env
    environment:
      # Override internal routing specifically for Docker bridging, preserving .env for the rest
      DB_HOST: db
      REDIS_HOST: redis
    depends_on:
      - db
      - redis

volumes:
  db_data:
  redis_data:
