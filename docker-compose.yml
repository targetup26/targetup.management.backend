version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: targetup_db
    restart: always
    env_file:
      - .env
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

  redis:
    image: redis:alpine
    container_name: targetup_redis
    restart: always
    env_file:
      - .env
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  backend:
    build: .
    container_name: targetup_backend
    restart: always
    ports:
      - "5050:5050"
    env_file:
      - .env
    depends_on:
      - db
      - redis

volumes:
  db_data:
  redis_data:
